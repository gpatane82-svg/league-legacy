<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A shareable fantasy football history hub for two leagues.">
  <title>League Legacy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="#overview">
        <span class="brand-mark">LL</span>
        <span><strong>League Legacy</strong><small>Fantasy archive</small></span>
      </a>

      <label class="field-label" for="leagueSelect">League</label>
      <select id="leagueSelect" class="select"></select>

      <nav class="nav" aria-label="Primary">
        <button class="nav-link active" data-view="overview">Overview</button>
        <button class="nav-link" data-view="standings">Standings</button>
        <button class="nav-link" data-view="managers">Managers</button>
        <button class="nav-link" data-view="history">Champions</button>
        <button class="nav-link" data-view="records">Record Book</button>
      </nav>

      <div class="sidebar-note">
        <span class="live-dot"></span>
        <div><strong>Static & free</strong><small>Ready for GitHub Pages</small></div>
      </div>
    </aside>

    <main>
      <header class="topbar">
        <div>
          <p class="eyebrow">Fantasy football history</p>
          <h1 id="pageTitle">League overview</h1>
        </div>
        <div class="topbar-actions">
          <label class="season-control">Season
            <select id="seasonSelect" class="select compact"></select>
          </label>
          <button id="shareButton" class="button">Copy page link</button>
        </div>
      </header>

      <section id="content" class="content"></section>
      <footer>Built from your historical league exports · No paid database required</footer>
    </main>
  </div>

  <script src="data/league-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
