<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Vandelay Industries Fantasy Football Division — official league archive.">
  <title>Vandelay Industries | Fantasy Football Division</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#content">Skip to league content</a>
  <div class="utility-strip">
    <div class="utility-inner">
      <span>Vandelay Industries, Inc.</span>
      <span class="utility-right">Fantasy Football Division · Internal Use</span>
    </div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a class="wordmark" href="#overview" aria-label="Vandelay Industries home">
        <span class="wordmark-v">V</span>
        <span class="wordmark-copy">
          <strong>Vandelay Industries</strong>
          <small>Fantasy Football Division</small>
        </span>
      </a>

      <div class="header-controls">
        <label>
          <span>League File</span>
          <select id="leagueSelect"></select>
        </label>
        <label>
          <span>Fiscal Season</span>
          <select id="seasonSelect"></select>
        </label>
      </div>
    </div>

    <nav class="main-nav" aria-label="Primary navigation">
      <div class="nav-inner">
        <button class="nav-link active" data-view="overview">League History</button>
        <button class="nav-link" data-view="standings">Corporate Performance</button>
        <button class="nav-link" data-view="managers">Personnel Files</button>
        <button class="nav-link" data-view="history">Executive Hall</button>
        <button class="nav-link" data-view="records">Records Department</button>
        <button class="nav-link" data-view="transactions">League Transactions</button>
      </div>
    </nav>
  </header>

  <main class="page-shell">
    <div class="page-heading">
      <div>
        <p class="kicker">Official corporate archive</p>
        <h1 id="pageTitle">League History</h1>
      </div>
      <button id="shareButton" class="office-button">Copy File Link</button>
    </div>
    <section id="content" class="content" tabindex="-1" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <div>Vandelay Industries · Fantasy Football Division</div>
    <div>Importing Championships. Exporting Excuses.</div>
  </footer>

  <script src="data/league-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
